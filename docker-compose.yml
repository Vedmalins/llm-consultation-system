services:
  auth_service:
    build:
      context: ./auth_service
    container_name: auth_service
    env_file:
      - ./auth_service/.env
    ports:
      - "8000:8000"
    volumes:
      - ./auth_service/auth.db:/app/auth.db

  bot_api:
    build:
      context: ./bot_service
    container_name: bot_api
    env_file:
      - ./bot_service/.env
    ports:
      - "8001:8001"
    depends_on:
      - redis
      - rabbitmq

  bot:
    build:
      context: ./bot_service
    container_name: bot
    env_file:
      - ./bot_service/.env
    command: python -m app.bot.run_bot
    depends_on:
      - redis
      - rabbitmq

  worker:
    build:
      context: ./bot_service
    container_name: worker
    env_file:
      - ./bot_service/.env
    command: celery -A app.infra.celery_app.celery_app worker --loglevel=info
    depends_on:
      - redis
      - rabbitmq

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"